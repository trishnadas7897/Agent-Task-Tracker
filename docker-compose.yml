# --------------------------------------------------------------------------
# Agent Task Tracker - local full stack
# Spin up the whole platform (Mongo + Flask API + React SPA) with:
#   docker compose up --build
# Then open http://localhost:8080 and sign up. The backend talks to the
# Mongo service inside the compose network; the frontend bundle was built
# against http://localhost:5000 so it works from your host browser.
# --------------------------------------------------------------------------

services:
  mongo:
    image: mongo:7
    container_name: att-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
    container_name: att-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/kpi_agent
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-replace-me-with-64-char-hex}
      JWT_EXP_DAYS: "1"
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY must be set (.env or shell)}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash}
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      PORT: "5000"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        # Browser will hit the host-exposed backend at :5000.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    container_name: att-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:8080"

volumes:
  mongo_data:
    driver: local
